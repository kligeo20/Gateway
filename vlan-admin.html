<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>VLAN Admin</title>

  <!-- ---------------------------------------------------------
       Feuille de style du module VLAN
       ---------------------------------------------------------
       - "vlan.css" contient le style spécifique du module.
       - Le design reprend la structure visuelle de wg-admin
         pour une cohérence dans Cockpit.
  --------------------------------------------------------- -->
  <link rel="stylesheet" href="vlan.css">
</head>

<body>
  <!-- ---------------------------------------------------------
       Conteneur principal
       ---------------------------------------------------------
       - Même structure que wg-admin pour garder une cohérence
         visuelle et UX dans Cockpit.
       - Toutes les cartes (cards) sont organisées dans ce div.
  --------------------------------------------------------- -->
  <div class="page">

    <!-- -------------------------------------------------------
         En-tête du module
         -------------------------------------------------------
         - Titre principal
         - Sous-titre explicatif
    ------------------------------------------------------- -->
    <div class="page-header">
      <h1>VLAN Admin</h1>
      <p class="subtitle">Gestion simple des VLANs via /etc/network/interfaces</p>
    </div>

    <!-- -------------------------------------------------------
         Carte : liste des VLANs détectés
         -------------------------------------------------------
         - Affiche les VLANs trouvés dans le fichier interfaces
         - Le JS remplit dynamiquement le tableau
    ------------------------------------------------------- -->
    <div class="card card--table">
      <div class="section-head">
        <h2>VLANs détectés</h2>

        <!-- Bouton pour recharger la liste -->
        <button id="refresh" class="btn btn-secondary">Rafraîchir</button>
      </div>

      <!-- Tableau scrollable -->
      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>VLAN</th>
              <th>Interface</th>
              <th>Adresse IP</th>
              <th>Parent</th>
              <th>Actions</th>
            </tr>
          </thead>

          <!-- Le JS insère ici les lignes des VLANs -->
          <tbody id="vlan-table-body"></tbody>
        </table>
      </div>
    </div>

    <!-- -------------------------------------------------------
         Carte : ajout d'un VLAN
         -------------------------------------------------------
         - Formulaire simple pour créer un VLAN
         - Le JS récupère les valeurs et appelle vlan-add.sh
    ------------------------------------------------------- -->
    <div class="card">
      <h2>Ajouter un VLAN</h2>

      <!-- Grille de champs -->
      <div class="detail-grid">

        <div class="detail-row">
          <div class="label">VLAN ID</div>
          <div><input id="new-vlan-id" type="number" min="1" max="4094"></div>
        </div>

        <div class="detail-row">
          <div class="label">Interface parent</div>
          <div><input id="new-vlan-parent" type="text" value="eth1"></div>
        </div>

        <div class="detail-row">
          <div class="label">Adresse IP</div>
          <div><input id="new-vlan-ip" type="text" placeholder="192.168.X.1"></div>
        </div>

        <div class="detail-row">
          <div class="label">Masque</div>
          <div><input id="new-vlan-mask" type="text" value="255.255.255.0"></div>
        </div>

      </div>

      <!-- Bouton d'ajout -->
      <div class="actions-inline">
        <button id="add-vlan" class="btn btn-primary">Ajouter VLAN</button>
      </div>
    </div>

    <!-- -------------------------------------------------------
         Carte : éditeur brut
         -------------------------------------------------------
         - Permet d’éditer directement /etc/network/interfaces
         - Le JS charge le fichier et l’envoie à vlan-apply.sh
    ------------------------------------------------------- -->
    <div class="card">
      <h2>Configuration brute</h2>

      <!-- Zone contenant le fichier interfaces -->
      <textarea id="interfaces-content"></textarea>

      <!-- Bouton appliquer -->
      <div class="actions-inline">
        <button id="apply-config" class="btn btn-primary">Appliquer</button>
      </div>

      <!-- Zone de statut (messages JS) -->
      <div id="status" class="status"></div>
    </div>

  </div>

  <!-- ---------------------------------------------------------
       Scripts JS
       ---------------------------------------------------------
       ⚠️ IMPORTANT :
       - cockpit.js doit être chargé dans l’iframe Cockpit
       - vlan.js contient toute la logique du module
       - L’ordre est important : cockpit.js → vlan.js
  --------------------------------------------------------- -->
  <script src="../base1/cockpit.js"></script>
  <script src="vlan.js"></script>
</body>
</html>
